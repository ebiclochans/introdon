<!DOCTYPE html>
<html lang="ja">
<head>

<title>ももクロ イントロドン！</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍀 ももクロ イントロドン！ 🍀</h1>

    <div id="player"></div>

    <div class="buttons">
        <button id="startBtn">スタート</button>
        <button id="nextBtn">次の曲</button>

        <span id="correct">0</span>
        /
        <span id="total">0</span>
